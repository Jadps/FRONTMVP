<div class="card">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-6">
        <div>
            <h1 class="text-2xl font-bold m-0 text-slate-900 dark:text-white">Gestión de Roles</h1>
            <p class="text-slate-500 dark:text-slate-400 m-0">Define niveles de acceso y permisos por módulo.</p>
        </div>
        <button pButton label="Nuevo Rol" icon="pi pi-plus" class="p-button-primary" (click)="onOpenDialog()"></button>
    </div>

    <p-table [value]="manager.roles()" [loading]="manager.isTableLoading()" [rows]="10" [paginator]="true"
        styleClass="p-datatable-sm" responsiveLayout="scroll">

        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="name">Nombre <p-sortIcon field="name"></p-sortIcon></th>
                <th pSortableColumn="description">Descripción <p-sortIcon field="description"></p-sortIcon></th>
                <th class="w-24 text-center">Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-role>
            <tr>
                <td class="font-medium">{{ role.name }}</td>
                <td>{{ role.description }}</td>
                <td class="text-center">
                    <button pButton icon="pi pi-pencil" class="p-button-text p-button-rounded"
                        (click)="onEdit(role)"></button>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="3" class="text-center p-4 text-slate-500">No se encontraron roles configurados.</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<app-role-form-dialog></app-role-form-dialog>

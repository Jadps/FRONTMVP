<div class="flex h-screen items-center justify-center bg-gray-50">
  <p-card header="Iniciar Sesión" styleClass="w-[90vw] max-w-sm">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      
      <div class="flex flex-col gap-2">
        <label for="email" class="font-medium text-gray-700">Correo Electrónico</label>
        <input 
          id="email" 
          type="email" 
          pInputText 
          formControlName="email" 
          class="w-full"
          placeholder="ejemplo@correo.com"
        />
      </div>

      <div class="flex flex-col gap-2">
        <label for="password" class="font-medium text-gray-700">Contraseña</label>
        <!-- PrimeNG Password requires inputStyleClass to set width 100% on the inner input -->
        <!-- styleClass="w-full" makes the wrapper take full width -->
        <!-- p-password is a custom component, we can use simple Tailwind classes -->
        <p-password 
          inputId="password" 
          formControlName="password" 
          [feedback]="false" 
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          placeholder="••••••••"
        ></p-password>
      </div>

      <p-button 
        type="submit" 
        label="Ingresar" 
        [loading]="isLoading()" 
        [disabled]="loginForm.invalid || isLoading()"
        class="w-full mt-2" 
        styleClass="w-full"
      ></p-button>

    </form>
  </p-card>
</div>

<nav class="sticky top-0 z-50 glass-dark px-8 py-4 flex justify-between items-center border-b border-white/5 shadow-2xl">

    <div class="flex items-center gap-4">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20 rotate-3">
            <i class="pi pi-box text-white text-lg"></i>
        </div>
        <div class="flex flex-col">
          <span class="font-bold text-lg tracking-tight text-white leading-none">
              Mi SaaS <span class="text-blue-500">MVP</span>
          </span>
          <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest mt-1">Enterprise Console</span>
        </div>
    </div>

    <div class="flex items-center gap-8">
        @if (authService.currentUser(); as user) {
        
        <div class="h-6 w-px bg-white/5"></div>

        <div class="flex items-center gap-4 pl-2">
          <div class="flex items-center gap-3 px-4 py-2 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 hover:border-blue-500/30 transition-all cursor-pointer group">
              <div class="text-right hidden sm:block">
                  <p class="text-[13px] font-bold text-zinc-100 leading-none mb-1.5">{{ user.nombreCompleto }}</p>
                  <div class="flex items-center justify-end gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                    <p class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest leading-none">{{ user.roles[0]?.name }}</p>
                  </div>
              </div>
              <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-zinc-700 to-zinc-900 flex items-center justify-center border border-white/10 group-hover:border-blue-500/50 transition-all shadow-inner">
                  <span class="text-sm font-black text-white">{{ user.nombreCompleto?.charAt(0) }}</span>
              </div>
          </div>

          <p-button 
              icon="pi pi-sign-out" 
              [rounded]="true" 
              [text]="true" 
              severity="secondary"
              (onClick)="logout()" 
              pTooltip="Finalizar Sesión"
              tooltipPosition="bottom"
              styleClass="!w-10 !h-10 !rounded-xl !bg-white/5 !border-white/10 hover:!bg-red-500/10 hover:!text-red-400 hover:!border-red-500/30 transition-all">
          </p-button>
        </div>
        }
    </div>

</nav>
